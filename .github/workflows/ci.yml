# This workflow builds, vets, lints, and tests the Go module, including integration
# tests that require a live Postgres instance.
# For more information see: https://github.com/actions/setup-go

name: Go CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/tonberry?sslmode=disable

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tonberry
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Integration test
        run: go test -tags=integration ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
